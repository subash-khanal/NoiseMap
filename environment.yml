# Conda environment for NoiseMap (data prep + training + inference)
# Create: conda env create -f environment.yml
# Activate: conda activate noisemap
# PyTorch is installed with CUDA 12.1 for GPU. For a different CUDA version see https://pytorch.org

name: noisemap
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pandas
  - pyarrow
  - requests
  - tqdm
  - geopandas
  - shapely
  - scikit-learn
  - pytorch
  - pytorch-cuda=12.1
  - pip:
    - wandb
    - earthengine-api
    # Optional, for heatmap in noise_ml.ipynb:
    # - aef-loader
    # - odc-geo
    # - pyproj
    # - nest-asyncio
